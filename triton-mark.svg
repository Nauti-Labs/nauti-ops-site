      <stop offset="1" stop-color="#030403"/>
    </radialGradient>
    <linearGradient id="silver" x1="58" x2="197" y1="54" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fffdf5"/>
      <stop offset="0.28" stop-color="#d9d7ce"/>
      <stop offset="0.55" stop-color="#8e918b"/>
